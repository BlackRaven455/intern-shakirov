<button (click)="showContent()" mat-stroked-button>Show log</button>

<div *ngIf="isVisible">
  <span *ngIf="messageService.messages.length === 0; else showMessages">No messages</span>

  <ng-template #showMessages>
    <ul>
      <li *ngFor="let message of messageService.messages">{{ message }}</li>
    </ul>
  </ng-template>

  <button (click)="clear()" class="clear-button" mat-stroked-button>Clear log</button>
</div>
